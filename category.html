<style>
  /* ===== category page (page-specific) ===== */
  .cat-hero{position:relative;height:300px;background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;text-align:center}
  .cat-hero .ov{position:absolute;inset:0;background:rgba(43,43,43,.5)}
  .cat-hero .c{position:relative;z-index:1;color:var(--ivory)}
  .cat-hero h1{color:var(--ivory);font-size:clamp(2.2rem,5vw,3.4rem);text-shadow:0 2px 20px rgba(0,0,0,.4);margin-top:10px}

  .breadcrumb{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:18px 0}
  .breadcrumb a{transition:color .3s}
  .breadcrumb a:hover{color:var(--gold-deep)}
  .breadcrumb .sep{margin:0 8px;color:var(--taupe)}
  .breadcrumb .cur{color:var(--charcoal)}

  .cat-bar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
    padding:0 0 18px;border-bottom:1px solid var(--line)}
  .cat-bar .chips{display:flex;gap:10px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);padding:7px 16px;font-size:12px;letter-spacing:.05em;
    text-transform:uppercase;cursor:pointer;transition:all .2s;user-select:none}
  .chip.active{background:var(--charcoal);color:var(--ivory);border-color:var(--charcoal)}
  .cat-bar .meta{font-size:13px;color:var(--muted)}

  .cat-body{display:grid;grid-template-columns:240px 1fr;gap:40px;padding:32px 0 96px}
  @media(max-width:900px){.cat-body{grid-template-columns:1fr}.filters{display:none}}

  .filters .fg{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:20px}
  .filters .fg .ft{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
  .filters .fg label{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);padding:4px 0;cursor:pointer}
  .filters .fg label .bx{width:16px;height:16px;border:1px solid var(--taupe);position:relative;flex-shrink:0}
  .filters .fg label .bx.on{background:var(--gold);border-color:var(--gold)}
  .filters .fg label .bx.on::after{content:"";position:absolute;left:4px;top:1px;width:5px;height:9px;
    border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .filters .colors{display:flex;gap:10px;flex-wrap:wrap}
  .filters .colors .c{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);cursor:pointer;transition:box-shadow .2s}
  .filters .colors .c.on{box-shadow:0 0 0 2px var(--gold),0 0 0 4px var(--ivory)}

  /* product cards (shared visual language with the home page) */
  .prods{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:980px){.prods{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.prods{grid-template-columns:1fr}}
  .card{cursor:pointer;display:block}
  .card .imgbox{position:relative;aspect-ratio:4/5;overflow:hidden;border:1px solid var(--line);background:var(--cream);transition:box-shadow .5s}
  .card:hover .imgbox{box-shadow:0 18px 40px rgba(43,43,43,.12)}
  .card .imgbox .bg{position:absolute;inset:0;background-size:cover;background-position:center;
    transition:transform .7s cubic-bezier(.22,1,.36,1),opacity .7s}
  .card .imgbox .bg2{opacity:0}
  .card:hover .bg1{opacity:0;transform:scale(1.04)}
  .card:hover .bg2{opacity:1;transform:scale(1.04)}
  .card .badge{position:absolute;top:12px;left:12px;padding:4px 10px;font-size:10px;font-weight:600;
    letter-spacing:.1em;text-transform:uppercase;color:#fff;z-index:2}
  .badge-best{background:var(--gold)}.badge-new{background:var(--charcoal)}.badge-sale{background:#B5544A}
  .card .fav{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;
    background:rgba(250,247,242,.85);display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .3s;z-index:2}
  .card:hover .fav{opacity:1}
  .card .fav svg{width:16px;height:16px;stroke:var(--charcoal);stroke-width:1.5;fill:none}
  .card .info{padding-top:18px}
  .card .info h3{font-size:20px;font-weight:500;transition:color .3s}
  .card:hover .info h3{color:var(--gold-deep)}
  .card .info .mat{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .card .info .rate{display:flex;align-items:center;gap:5px;font-size:12px;margin-top:10px}
  .card .info .rate .star{color:var(--gold)}
  .card .info .price{margin-top:10px;font-weight:500;font-family:var(--serif);font-size:19px}
  .card .info .price .old{color:var(--taupe);text-decoration:line-through;margin-left:8px;font-size:14px}
</style>

<body>

      <div class="fg" style="border:none">

<script>
  /* ---- category product data ---- */
  var U = function (id, w) {
    return 'https://images.unsplash.com/photo-' + id + '?auto=format&fit=crop&w=' + (w || 600) + '&q=80';
  };
  var products = [
    {t:"Wooden Place Names",m:"Oak · Walnut · Birch",p:"$4.50",r:"4.9",rv:"532",b:"best",i:"1464366400600-7168b8af9bc3",h:"1511285560929-80b456fea0bc"},
    {t:"Acrylic Place Names",m:"Frosted · Clear · Mirror",p:"$5",r:"4.9",rv:"287",b:"new",i:"1606800052052-a08af7148866",h:"1519225421980-715cb0215aed"},
    {t:"Gold-Edge Table Numbers",m:"Acrylic · 1–30",p:"$48",o:"$60",r:"4.8",rv:"318",b:"sale",i:"1523438885200-e635ba2c371e",h:"1478146896981-b80fe463b330"},
    {t:"Custom Script Cake Topper",m:"Acrylic · Gold mirror",p:"$32",r:"5.0",rv:"421",b:"best",i:"1535254973040-607b474cb50d",h:"1522767131594-6b7e96848fba"},
    {t:"Arched Welcome Sign",m:"Acrylic · Custom text",p:"$95",r:"5.0",rv:"176",i:"1591604466107-ec97de577aff",h:"1525258946800-98cfd641d0de"},
    {t:"Mirror Acrylic Seating Chart",m:"Acrylic · 6 finishes",p:"$128",o:"$160",r:"4.9",rv:"214",b:"best",i:"1519225421980-715cb0215aed",h:"1606800052052-a08af7148866"},
    {t:"Custom Logo Sign",m:"Layered Acrylic + Wood",p:"$240",r:"4.9",rv:"64",b:"new",i:"1517248135467-4c7edcad34c4",h:"1554118811-1e0d58224f24"},
    {t:"Personalized Keepsake Gift",m:"Walnut · Engraved",p:"$38",r:"4.8",rv:"142",i:"1503602642458-232111445657",h:"1525258946800-98cfd641d0de"},
    {t:"Rustic Wood Table Numbers",m:"Oak · Engraved",p:"$40",r:"4.8",rv:"98",i:"1464366400600-7168b8af9bc3",h:"1523438885200-e635ba2c371e"},
    {t:"Hexagon Acrylic Place Cards",m:"Acrylic · Geometric",p:"$6",r:"4.9",rv:"203",b:"new",i:"1606800052052-a08af7148866",h:"1478146896981-b80fe463b330"}
  ];
  var badgeCls = {best:"badge-best", "new":"badge-new", sale:"badge-sale"};
  var badgeTxt = {best:"Bestseller", "new":"New", sale:"Sale"};

  function card(p) {
    return '<a class="card" href="product.html">' +
      '<div class="imgbox">' +
        (p.b ? '<span class="badge ' + badgeCls[p.b] + '">' + badgeTxt[p.b] + '</span>' : '') +
        '<span class="fav" role="button" aria-label="Add to wishlist"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6 5c2 0 3.2 1.3 4 2.5C10.8 6.3 12 5 14 5c3.5 0 5 4 3.5 7-2.5 4.5-9.5 9-9.5 9z"/></svg></span>' +
        '<div class="bg bg1" role="img" aria-label="' + p.t + ' — ' + p.m + '" style="background-image:url(\'' + U(p.i, 600) + '\')"></div>' +
        '<div class="bg bg2" aria-hidden="true" style="background-image:url(\'' + U(p.h, 600) + '\')"></div>' +
      '</div>' +
      '<div class="info">' +
        '<h3>' + p.t + '</h3>' +
        '<div class="mat">' + p.m + '</div>' +
        '<div class="rate"><span class="star">★</span> ' + p.r + ' <span style="color:var(--muted)">(' + p.rv + ')</span></div>' +
        '<div class="price">' + p.p + (p.o ? '<span class="old">' + p.o + '</span>' : '') + '</div>' +
      '</div>' +
    '</a>';
  }

  var grid = document.getElementById('catProds');
  grid.innerHTML = products.map(card).join('');
  document.getElementById('catMeta').textContent = products.length + ' pieces · Sort: Popular';

  /* heart = wishlist (don't navigate); card body = go to product.html */
  grid.addEventListener('click', function (e) {
    var fav = e.target.closest('.fav');
    if (fav) {
      e.preventDefault();
      fav.classList.toggle('on');
      window.toast(fav.classList.contains('on') ? 'Added to wishlist' : 'Removed from wishlist');
    }
  });

  /* style chips (single select) */
  document.querySelectorAll('.cat-bar .chips .chip').forEach(function (c) {
    c.addEventListener('click', function () {
      var cur = document.querySelector('.cat-bar .chips .chip.active');
      if (cur) cur.classList.remove('active');
      c.classList.add('active');
    });
  });

  /* filter checkboxes + colour swatches */
  document.querySelectorAll('.filters .fg label').forEach(function (l) {
    var bx = l.querySelector('.bx');
    if (bx) l.addEventListener('click', function () { bx.classList.toggle('on'); });
  });
  document.querySelectorAll('.filters .colors .c').forEach(function (c) {
    c.addEventListener('click', function () { c.classList.toggle('on'); });
  });
</script>
</body>
